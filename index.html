
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expiry Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ZXing Barcode Scanner -->
<script src="https://unpkg.com/@zxing/library@latest"></script>


<style>
:root{
  --primary:#0f6cbd;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#1f2933;
  --muted:#6b7280;
  --radius:14px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.app{
  max-width:520px;
  margin:auto;
}

/* ---------- HEADER ---------- */
header{
  padding:20px;
  font-size:22px;
  font-weight:700;
  color:#fff;
  background:var(--primary);
  border-radius:0 0 18px 18px;
}

/* ---------- PAGES ---------- */
.page{padding:20px}

/* ---------- UI ---------- */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

label{
  font-weight:600;
  display:block;
  margin-bottom:6px;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}

input[readonly]{background:#eef2f6}

.row{
  display:flex;
  gap:10px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

.secondary{
  background:#e5e7eb;
  color:#333;
}

/* ---------- SCANNER ---------- */
.icon-btn{
  width:60px;
  background:#0b4f8a;
}

#scannerOverlay{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  z-index:9999;
}

#scannerVideo{
  width:100%;
  height:100%;
  object-fit:cover;
}

#scannerClose{
  position:absolute;
  top:14px;
  right:14px;
  background:red;
  border:none;
  padding:10px 14px;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

<header id="headerText">Select Store</header>

<!-- ================= STORE PAGE ================= -->
<div id="storePage" class="page">
  <div class="card">
    <label>Store</label>
    <select id="storeSelect">
      <option>Loading stores…</option>
    </select>
  </div>
  <button onclick="goToEntry()">Continue</button>
</div>

<!-- ================= ENTRY PAGE ================= -->
<div id="entryPage" class="page" style="display:none">
<!-- ✅ EXPIRY WEEK AS DROPDOWN -->
  <div class="card">
    <label>Expiry Week</label>
    <select id="weekSelect">
      <option value="">Select expiry week</option>
      <option value="Week 1 (1–7)">Week 1 (1–7)</option>
      <option value="Week 2 (8–14)">Week 2 (8–14)</option>
      <option value="Week 3 (15–21)">Week 3 (15–21)</option>
      <option value="Week 4 (22–31)">Week 4 (22–31)</option>
    </select>
  </div>
  <div class="card">
    <label>Article Code</label>
    <input id="articleInput">
  </div>

  <div class="card">
    <label>Barcode</label>
    <div class="row">
      <input id="barcodeInput">
      <button class="icon-btn" onclick="openScanner()">📷</button>
    </div>
  </div>

  <div class="card">
    <label>Description</label>
    <input id="descInput" readonly>
  </div>

 
  <div class="card row">
    <div style="flex:1">
      <label>Stock</label>
      <input type="number" id="stockInput">
    </div>
    <div style="flex:1">
      <label>Expiry Date</label>
      <input type="date" id="expiryInput">
    </div>
  </div>

  <button onclick="submitEntry()">Submit</button>
  <button class="secondary" onclick="backToStore()">Change Store</button>

</div>

</div>

<!-- ================= CAMERA ================= -->
<div id="scannerOverlay">
  <button id="scannerClose" onclick="closeScanner()">✕</button>
  <video id="scannerVideo"></video>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwvJ9069dOAncBLWAWUuAsjqY-78_xkfuo4TUqLSi1JqxEtDb6PqeFXINypEuOM3unM9A/exec";
let articles = [];
const reader = new ZXing.BrowserMultiFormatReader();

/* ---------- STORES ---------- */
async function loadStores(){
  const r = await fetch(`${API_URL}?action=stores`);
  const data = await r.json();
  storeSelect.innerHTML='<option value="">Select store</option>';
  data.forEach(row=>{
    const o=document.createElement("option");
    o.value=row[0];
    o.textContent=row[1];
    storeSelect.appendChild(o);
  });
}

function goToEntry(){
  if(!storeSelect.value){alert("Select store");return;}
  headerText.innerText =
    storeSelect.options[storeSelect.selectedIndex].text;
  storePage.style.display="none";
  entryPage.style.display="block";
}

function backToStore(){
  storePage.style.display="block";
  entryPage.style.display="none";
}

/* ---------- ARTICLES ---------- */
async function loadArticles(){
  const r = await fetch(`${API_URL}?action=articles`);
  const data = await r.json();
  articles = data.map(a=>({
    article:String(a[0]).trim(),
    barcode:String(a[1]).trim(),
    desc:String(a[2]).trim()
  }));
}

articleInput.oninput=()=>{
  const m = articles.find(a=>a.article===articleInput.value.trim());
  if(m){
    barcodeInput.value=m.barcode;
    descInput.value=m.desc;
  }
};

barcodeInput.oninput=()=>{
  const m = articles.find(a=>a.barcode===barcodeInput.value.trim());
  if(m){
    articleInput.value=m.article;
    descInput.value=m.desc;
  }
};

/* ---------- SCANNER ---------- */
async function openScanner(){
  scannerOverlay.style.display="block";
  await reader.decodeFromVideoDevice(null,"scannerVideo",(res)=>{
    if(res){
      barcodeInput.value=res.text;
      barcodeInput.dispatchEvent(new Event("input"));
      closeScanner();
    }
  });
}

function closeScanner(){
  reader.reset();
  scannerOverlay.style.display="none";
}

/* ---------- SUBMIT ---------- */
function getWeek(){
  return weekSelect.value;
}

async function submitEntry(){
  if(!descInput.value){alert("Invalid article/barcode");return;}
  if(!getWeek()){alert("Select expiry week");return;}

  const payload={
    storeCode:storeSelect.value,
    storeName:storeSelect.options[storeSelect.selectedIndex].text,
    week:getWeek(),
    article:articleInput.value,
    barcode:barcodeInput.value,
    description:descInput.value,
    stock:stockInput.value,
    expiry:expiryInput.value
  };

  await fetch(API_URL,{method:"POST",body:JSON.stringify(payload)});
  alert("✅ Submitted");

  articleInput.value="";
  barcodeInput.value="";
  descInput.value="";
  stockInput.value="";
  expiryInput.value="";
  weekSelect.value="";
}

/* ---------- INIT ---------- */
window.onload=async()=>{
  await loadStores();
  await loadArticles();
};
</script>

</body>
</html>
